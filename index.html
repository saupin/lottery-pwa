<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6C5CE7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🎰 Lottery Checker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>🎰 Lottery</h1>
            <div class="tabs">
                <button class="tab active" data-tab="check">Check</button>
                <button class="tab" data-tab="results">Results</button>
                <button class="tab" data-tab="predict">Predict</button>
                <button class="tab" data-tab="analysis">Analysis</button>
            </div>
        </header>

        <main>
            <!-- Check Tab -->
            <section id="check-tab" class="tab-content active">
                <div class="input-group">
                    <input type="text" id="number-input" placeholder="4-digit number" maxlength="4" pattern="[0-9]*" inputmode="numeric">
                    <div class="lottery-select">
                        <label><input type="checkbox" value="damacai" checked> <span>DaMaCai</span></label>
                        <label><input type="checkbox" value="toto" checked> <span>Toto</span></label>
                        <label><input type="checkbox" value="magnum" checked> <span>Magnum</span></label>
                    </div>
                    <div class="draws-input">
                        <label for="draws-input">Draws to check:</label>
                        <input type="number" id="draws-input" placeholder="All (no limit)" min="1" max="2000">
                        <span class="hint-text">Leave blank to check ALL draws since 2014</span>
                    </div>
                </div>
                <div class="button-row">
                    <button class="btn-secondary" id="btn-clear">🗑️ Clear</button>
                    <button class="btn-primary" id="btn-check">🔍 Check Number</button>
                </div>
                <div id="check-result" class="result-box"></div>
                    <div style="text-align:center;margin-top:15px">
                        <button class="btn-secondary" id="btn-check-algorithm" style="font-size:0.85rem">📊 View Algorithm</button>
                    </div>
                    <div id="check-algorithm-display" class="algorithm-box" style="display:none"></div>
            </section>

            <!-- Results Tab -->
            <section id="results-tab" class="tab-content">
                <div class="date-selector">
                    <input type="date" id="result-date">
                    <button class="btn-small" id="btn-go">Go</button>
                </div>
                <div id="results-display" class="results-container">
                    <p class="hint">Select date to view all lottery results</p>
                </div>
            </section>

            <!-- Predict Tab -->
            <section id="predict-tab" class="tab-content">
                <div class="predict-section">
                    <h3 style="text-align:center;margin-bottom:15px">🎯 Number Predictor</h3>
                    <p style="text-align:center;color:#6e6e6e;margin-bottom:20px">Based on DaMaCai patterns (2014-2026)</p>
                    <div class="button-row">
                        <button class="btn-secondary" id="btn-predict-dmc">DaMaCai</button>
                        <button class="btn-secondary" id="btn-predict-toto">Toto</button>
                        <button class="btn-secondary" id="btn-predict-magnum">Magnum</button>
                    </div>
                    <div id="predict-display" class="predict-result"></div>
                    <div style="text-align:center;margin-top:20px">
                        <button class="btn-secondary" id="btn-show-algorithm" style="font-size:0.85rem">📊 How does this work?</button>
                    </div>
                    <div id="algorithm-display" class="algorithm-box" style="display:none"></div>
                </div>
            </section>

            <!-- Analysis Tab -->
            <section id="analysis-tab" class="tab-content">
                <div id="analysis-display" class="result-box"></div>
            </section>
        </main>

        <footer>
            <small>Data from past draws • Not a real gambling app</small>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
